databases:
  - name: ecommerce-db
    plan: free
    region: ohio
    databaseName: ecommerce
    user: ecommerce_user

services:
  # The FastAPI Backend
  - type: web
    name: ecommerce-backend
    env: docker
    plan: free
    region: ohio
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ecommerce-db
          property: connectionString
